name: Terraform Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Terraform deployment environment
        required: true
        type: string
      region:
        description: AWS region
        required: true
        type: string
      auto-approve-apply:
        description: Auto approve terraform apply; useful in testing environments
        type: boolean
      test-destroy:
        description: Run terraform destroy
        type: boolean
    secrets:
      provider-credentials:
        description: The ARN of the role for which to fetch credentials
        required: true
      backend-credentials:
        description: Credentials required for remote state
        required: true

# Disable permissions for all available scopes.
permissions: {}

jobs:
  plan-and-apply:
    name: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      actions: read # Required to download repository artifact.
      checks: write # Required to add status summary.
      contents: read # Required to checkout repository.
      id-token: write # Required to authenticate via OIDC.
      issues: write # Required to create workflow failure issues.
      pull-requests: write # Required to add PR comment and label.

    env:
      TF_TOKEN_APP_TERRAFORM_IO: ${{ secrets.backend-credentials }}
      # Org = 3ware, Project = gitops-2024, so ommitting from workspace name
      TF_WORKSPACE: app-${{ inputs.region }}-${{ inputs.environment }}

    environment: ${{ inputs.environment }}

    steps:
      - name: Set environment variables
        # Replace '/' with '-' Most things like dashes and do not like forward slashes
        run: |
          echo "REPOSITORY=$(echo ${{ github.repository }} | tr / -)" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: ${{ secrets.provider-credentials }}
          # $REPOSITORY, as described in the github docs, does not work
          role-session-name: "${{ env.REPOSITORY }}-${{ inputs.environment }}-terraform-deploy"

      - name: Setup terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          # TODO: Add tfswitch or other to read value from terraform block
          terraform_version: 1.9.7
          terraform_wrapper: true

      # Run this step with `apply -auto-approve` if the input is provided
      # If no input is provided run `plan`
      # This allows a calling workflow to define how this step is run with a safe default of running plan
      - name: ${{ inputs.auto-approve-apply && 'Apply' || 'Plan' }}
        uses: devsectop/tf-via-pr@cc83c7bae8216e747bb8c074524665b2416822f5 # v11.4.6
        with:
          arg_chdir: terraform
          arg_command: ${{ inputs.auto-approve-apply && 'apply' || 'plan' }}
          arg_auto_approve: ${{ inputs.auto-approve-apply && 'true' || 'false' }}
          arg_lock: ${{ inputs.auto-approve-apply && 'true' || 'false' }}
          arg_out: tfplan-${{ github.head_ref}}-PR${{ github.event.pull_request.number}}-out
          arg_var_file: ${{ inputs.environment }}.tfvars

      # TODO: Add pr comment explaining what to do run trigger apply

      # Request a pull request review if auto-approve-apply is not set
      - name: Add Pull Request Reviewer
        if: ${{ !inputs.auto-approve-apply }}
        uses: rhs/add-reviewer-gh-action@1.0.6
        with:
          reviewers: repo-maintainers
          token: ${{ secrets.GITHUB_TOKEN }}

      # TODO: Add label tf:plan-approved to PR on approval

